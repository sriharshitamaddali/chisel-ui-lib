name: Publish to GitHub Packages

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    defaults:
      run:
        working-directory: ./chisel

    steps:
      - name: Generate token from GitHub App
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.ACTIONS_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@sriharshitamaddali"

      - name: Configure npm auth
        run: |
          echo "@sriharshitamaddali:registry=https://npm.pkg.github.com" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ steps.generate-token.outputs.token }}" >> ~/.npmrc

      - name: Install dependencies
        run: npm install --include=dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Bump version
        run: npm version patch --no-git-tag-version

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add package.json
          git commit -m "chore: bump version [skip ci]"
          git push origin master
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ steps.generate-token.outputs.token }}
